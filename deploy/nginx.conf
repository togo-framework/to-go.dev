server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Raw text for agents (AEO) + install scripts
  location ~* \.md$      { default_type text/plain; charset utf-8; }
  location = /llms.txt   { default_type text/plain; charset utf-8; }
  location = /install.sh { default_type text/plain; charset utf-8; }
  location = /update.sh  { default_type text/plain; charset utf-8; }
  location = /sitemap.xml { default_type application/xml; }

  # Long-cache hashed assets
  location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }

  # Prerendered clean URLs: /repos -> /repos.html, /docs/x -> /docs/x.html (direct 200, no redirect)
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }
}
