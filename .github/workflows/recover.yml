name: recover

# FIX: restore the host -> LXC 201 (10.10.10.10) DNAT port-forwarding for 80/443
# that got flushed (public IP on eth0; container serves on the private bridge).
# Additive + idempotent; does NOT touch SSH/22 or flush anything.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/recover.yml']

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Restore 80/443 DNAT host -> LXC 201
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy && chmod 600 ~/.ssh/deploy
          SSH="ssh -i $HOME/.ssh/deploy -o StrictHostKeyChecking=no -o ConnectTimeout=25"
          $SSH "root@$DEPLOY_HOST" 'bash -s' <<"EOS"
            set -u
            LXC=10.10.10.10
            sysctl -w net.ipv4.ip_forward=1 >/dev/null
            for P in 80 443; do
              iptables -t nat -C PREROUTING -i eth0 -p tcp --dport $P -j DNAT --to-destination $LXC:$P 2>/dev/null \
                || iptables -t nat -A PREROUTING -i eth0 -p tcp --dport $P -j DNAT --to-destination $LXC:$P
              # also handle host-local / hairpin (OUTPUT) so the box itself reaches its public IP
              iptables -t nat -C OUTPUT -p tcp -d 127.0.0.1 --dport $P -j DNAT --to-destination $LXC:$P 2>/dev/null || true
              iptables -C FORWARD -p tcp -d $LXC --dport $P -j ACCEPT 2>/dev/null \
                || iptables -I FORWARD -p tcp -d $LXC --dport $P -j ACCEPT
            done
            echo "=== nat PREROUTING now ==="; iptables -t nat -S PREROUTING | grep -E "dport (80|443)" || echo "STILL-NONE"
            echo "=== verify on the host's public IP ==="
            PUB=$(ip -4 addr show eth0 | grep -oE "inet [0-9.]+" | awk "{print \$2}" | head -1); echo "PUB=$PUB"
            sleep 1
            curl -sS  -o /dev/null -w "pub:80=%{http_code}\n"  --max-time 8 http://$PUB:80/ || echo "pub:80=down"
            curl -skS -o /dev/null -w "pub:443=%{http_code}\n" --max-time 8 --resolve to-go.dev:443:$PUB https://to-go.dev/ || echo "pub:443=down"
          EOS
          rm -f ~/.ssh/deploy
