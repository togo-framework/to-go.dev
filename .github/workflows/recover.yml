name: recover

# Incident recovery + NPM 443 diagnostics. The box is up (SSH ok); the NPM
# reverse proxy fronts every *.to-go.dev on 80/443. Restart it, then inspect why
# the TLS (443) listener isn't accepting. Safe to re-run (workflow_dispatch).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/recover.yml']

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Restart NPM + diagnose the 443/TLS listener
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy && chmod 600 ~/.ssh/deploy
          SSH="ssh -i $HOME/.ssh/deploy -o StrictHostKeyChecking=no -o ConnectTimeout=25"
          $SSH "root@$DEPLOY_HOST" '
            E="pct exec 201 --";
            echo "=== restart npm + npm-db ==="; $E docker restart npm-db npm || true; sleep 12;
            echo "=== npm status ==="; $E docker ps --format "{{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -i npm;
            echo "=== nginx -t inside npm ==="; $E docker exec npm nginx -t 2>&1 | tail -5 || echo "nginx-t-FAILED";
            echo "=== listeners inside npm (80/443) ==="; $E docker exec npm sh -c "(netstat -tlnp 2>/dev/null || ss -tlnp 2>/dev/null) | grep -E \":80|:443\"" || echo "no-listener-tool";
            echo "=== npm logs (tail) ==="; $E docker logs npm --tail 25 2>&1 | tail -25;
            echo "=== default (fallback) cert present? ==="; $E docker exec npm sh -c "ls -la /data/nginx/default_host/ 2>/dev/null; ls /etc/letsencrypt/live 2>/dev/null | head" || true;
            echo "=== local probe with SNI ==="; $E docker exec npm sh -c "curl -skS -o /dev/null -w \"443-sni=%{http_code}\\n\" --resolve to-go.dev:443:127.0.0.1 https://to-go.dev/ || echo 443-sni=down";
            echo "=== host port published? ==="; $E ss -tlnp 2>/dev/null | grep -E \":80 |:443 \" || echo "host-ss-none";
          '
          rm -f ~/.ssh/deploy
