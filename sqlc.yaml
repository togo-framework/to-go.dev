version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/db/schema"
    queries: "internal/db/queries"
    gen:
      go:
        package: "db"
        out: "internal/db/gen"
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "datetime"
            go_type: "time.Time"
